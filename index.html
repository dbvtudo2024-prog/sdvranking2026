
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sentinelas da Verdade</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0061f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinelas">
    <link rel="apple-touch-icon" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    <link rel="icon" type="image/png" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0061f2; /* Cor de fundo padrão para evitar flicker branco */
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }
        body.dark {
            background-color: #0f172a;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #root {
            height: 100%;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root">
        <!-- Splash Screen Estático (enquanto o JS carrega) -->
        <div id="splash-screen" style="position: fixed; inset: 0; background-color: #0061f2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif;">
            <div style="position: relative;">
                <div style="position: absolute; inset: 0; background-color: rgba(255,255,255,0.2); border-radius: 9999px; filter: blur(40px); animation: pulse 2s infinite;"></div>
                <img src="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG" style="width: 256px; height: 256px; object-fit: contain; position: relative; z-index: 10; animation: zoom-in 1s ease-out; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));" alt="Logo">
            </div>
            <div style="margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 16px;">
                <h1 style="font-size: 24px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: -0.05em; margin: 0;">Sentinelas da Verdade</h1>
                <div style="width: 192px; height: 6px; background-color: rgba(255,255,255,0.2); border-radius: 9999px; overflow: hidden;">
                    <div style="height: 100%; background-color: white; width: 0%; animation: loading-bar 2s infinite ease-in-out;"></div>
                </div>
                <p style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.3em; margin: 0;">Carregando Clube...</p>
            </div>
            <style>
                @keyframes loading-bar {
                    0% { width: 0%; transform: translateX(-100%); }
                    50% { width: 70%; transform: translateX(50%); }
                    100% { width: 0%; transform: translateX(150%); }
                }
                @keyframes pulse {
                    0%, 100% { opacity: 0.5; }
                    50% { opacity: 1; }
                }
                @keyframes zoom-in {
                    0% { transform: scale(0.5); opacity: 0; }
                    100% { transform: scale(1); opacity: 1; }
                }
            </style>
        </div>
    </div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>

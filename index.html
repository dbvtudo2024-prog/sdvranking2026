
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sentinelas da Verdade</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0061f2">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinelas">
    
    <!-- Splash Screen Meta for iOS -->
    <link rel="apple-touch-startup-image" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    
    <link rel="apple-touch-icon" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    <link rel="icon" type="image/png" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent; /* Removido para evitar flicker */
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0061f2 !important; /* Força o azul desde o milissegundo zero */
        }
        #root {
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- Splash Screen (fora do root para controle de transição) -->
    <div id="splash-screen" style="position: fixed; inset: 0; background-color: #0061f2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; transition: opacity 0.4s ease, visibility 0.4s ease;">
        <div style="position: relative; width: 128px; height: 128px; display: flex; align-items: center; justify-content: center;">
            <div style="position: absolute; inset: -20px; background-color: rgba(255,255,255,0.15); border-radius: 9999px; filter: blur(30px); animation: pulse 2s infinite;"></div>
            <img src="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG" style="width: 128px; height: 128px; object-fit: contain; position: relative; z-index: 10; animation: zoom-in 0.8s cubic-bezier(0.16, 1, 0.3, 1); filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));" alt="Logo">
        </div>
        <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
            <h1 style="font-size: 18px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: -0.02em; margin: 0; opacity: 0.9;">Sentinelas da Verdade</h1>
            <div style="width: 140px; height: 4px; background-color: rgba(255,255,255,0.2); border-radius: 9999px; overflow: hidden;">
                <div style="height: 100%; background-color: white; width: 0%; animation: loading-bar 1.5s infinite ease-in-out;"></div>
            </div>
            <p style="font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.4em; margin: 0;">Carregando...</p>
        </div>
        <style>
            @keyframes loading-bar {
                0% { width: 0%; transform: translateX(-100%); }
                50% { width: 70%; transform: translateX(50%); }
                100% { width: 0%; transform: translateX(150%); }
            }
            @keyframes pulse {
                0%, 100% { opacity: 0.5; }
                50% { opacity: 1; }
            }
            @keyframes zoom-in {
                0% { transform: scale(0.5); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            .splash-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        </style>
    </div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>

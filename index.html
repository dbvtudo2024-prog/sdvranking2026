
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sentinelas da Verdade</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0061f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinelas">
    <link rel="apple-touch-icon" href="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }
        body.dark {
            background-color: #0f172a;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #root {
            height: 100%;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root">
        <!-- Splash Screen Estático (enquanto o JS carrega) -->
        <div style="position: fixed; inset: 0; background-color: #0061f2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif;">
            <img src="https://lhcobtexredrovjbxaew.supabase.co/storage/v1/object/public/Imagens/app/brasao3d.PNG" style="width: 180px; height: 180px; object-fit: contain; margin-bottom: 20px;" alt="Logo">
            <div style="width: 120px; height: 4px; background-color: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;">
                <div style="width: 100%; height: 100%; background-color: white; animation: loading-bar 2s infinite ease-in-out;"></div>
            </div>
            <style>
                @keyframes loading-bar {
                    0% { transform: translateX(-100%); }
                    100% { transform: translateX(100%); }
                }
            </style>
        </div>
    </div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
